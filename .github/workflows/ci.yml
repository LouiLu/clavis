name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ──────────────────────────────────────

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: |
            apps/gateway/go.sum
            apps/sample-backend/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: apps/gateway
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: apps/sample-backend

  lint-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint

  # ── Test ──────────────────────────────────────

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: |
            apps/gateway/go.sum
            apps/sample-backend/go.sum
      - run: go test -race -count=1 ./...
        working-directory: apps/gateway
      - run: go test -race -count=1 ./...
        working-directory: apps/sample-backend

  test-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test

  # ── Build ─────────────────────────────────────

  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: |
            apps/gateway/go.sum
            apps/sample-backend/go.sum
      - run: go build ./...
        working-directory: apps/gateway
      - run: go build ./...
        working-directory: apps/sample-backend

  build-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        working-directory: apps/control-plane
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      - run: pnpm -r build
