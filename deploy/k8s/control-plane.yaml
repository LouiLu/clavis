apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: clavis
spec:
  selector:
    app: control-plane
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: clavis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      containers:
        - name: control-plane
          image: clavis/control-plane:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: clavis-config
            - secretRef:
                name: clavis-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
