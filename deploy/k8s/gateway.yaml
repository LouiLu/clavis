apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: clavis
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: clavis
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: clavis/gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: GATEWAY_PORT
              valueFrom:
                configMapKeyRef:
                  name: clavis-config
                  key: GATEWAY_PORT
            - name: CONTROL_PLANE_URL
              value: "http://control-plane.clavis.svc.cluster.local:4000"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: clavis-secrets
                  key: REDIS_URL
            - name: GATEWAY_LOGGING_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: clavis-config
                  key: GATEWAY_LOGGING_ENABLED
            - name: GATEWAY_LOG_CHANNEL_SIZE
              valueFrom:
                configMapKeyRef:
                  name: clavis-config
                  key: GATEWAY_LOG_CHANNEL_SIZE
            - name: GATEWAY_LOG_BATCH_SIZE
              valueFrom:
                configMapKeyRef:
                  name: clavis-config
                  key: GATEWAY_LOG_BATCH_SIZE
            - name: GATEWAY_LOG_FLUSH_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: clavis-config
                  key: GATEWAY_LOG_FLUSH_INTERVAL
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
