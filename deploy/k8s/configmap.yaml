apiVersion: v1
kind: ConfigMap
metadata:
  name: clavis-config
  namespace: clavis
data:
  # Control plane
  CONTROL_PLANE_PORT: "4000"
  # Gateway
  GATEWAY_PORT: "8080"
  GATEWAY_LOGGING_ENABLED: "true"
  GATEWAY_LOG_CHANNEL_SIZE: "10000"
  GATEWAY_LOG_BATCH_SIZE: "100"
  GATEWAY_LOG_FLUSH_INTERVAL: "5s"
  # Admin portal (passed at build time via VITE_CONTROL_PLANE_URL)
  ADMIN_PORTAL_PORT: "80"
