apiVersion: v1
kind: Secret
metadata:
  name: clavis-secrets
  namespace: clavis
type: Opaque
stringData:
  # Replace these with actual values. Do not commit real secrets.
  DATABASE_URL: "postgresql://platform:CHANGE_ME@postgres-host:5432/platform?schema=public"
  REDIS_URL: "redis://CHANGE_ME@redis-host:6379"
  SEED_ADMIN_PASSWORD: "CHANGE_ME"
  SEED_ADMIN_EMAIL: "admin@example.local"
